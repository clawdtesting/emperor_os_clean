name: Dry Run — AGIJobManager Loop

on:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AGI_ALPHA_MCP:      ${{ secrets.AGI_ALPHA_MCP }}
      ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL:    ${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}
      ENS_SUBDOMAIN:      ${{ secrets.ENS_SUBDOMAIN }}
      PINATA_JWT:         ${{ secrets.PINATA_JWT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AgiJobManager/package.json

      - name: Install dependencies
        run: npm install
        working-directory: AgiJobManager

      - name: Dry run loop
        run: node dry_run_loop.js
        working-directory: AgiJobManager
