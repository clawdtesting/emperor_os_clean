name: Check Procurements (Contract 2)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      ETH_RPC_URL:       ${{ secrets.ETH_RPC_URL }}
      AGENT_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install ethers dotenv
        working-directory: AgiPrimeDiscovery

      - name: Scan Contract 2 procurements
        run: node check_procurements.js
        working-directory: AgiPrimeDiscovery
