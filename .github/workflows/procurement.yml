name: Procurement Agent (Contract 2)

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AGI_ALPHA_MCP:      ${{ secrets.AGI_ALPHA_MCP }}
      ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL:    ${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      ETH_RPC_URL:        ${{ secrets.ETH_RPC_URL }}
      AGENT_ADDRESS:      ${{ secrets.WALLET_ADDRESS }}
      AGENT_SUBDOMAIN:    ${{ secrets.ENS_SUBDOMAIN }}
      AGENT_MERKLE_PROOF: ${{ secrets.AGENT_MERKLE_PROOF || '[]' }}
      PINATA_JWT:         ${{ secrets.PINATA_JWT }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install

      - name: Validate contracts
        run: node scripts/validate-contracts.mjs

      - name: Run procurement poll
        run: node loops/AGIJobPrime-v1/run_once.js
