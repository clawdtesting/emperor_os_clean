name: Dry Run — Procurement Flow (Contract 2)

on:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      AGI_ALPHA_MCP:      ${{ secrets.AGI_ALPHA_MCP }}
      ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL:    ${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      ETH_RPC_URL:        ${{ secrets.ETH_RPC_URL }}
      AGENT_PRIVATE_KEY:  ${{ secrets.WALLET_PRIVATE_KEY }}
      AGENT_SUBDOMAIN:    ${{ secrets.ENS_SUBDOMAIN }}
      PINATA_JWT:         ${{ secrets.PINATA_JWT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: AgiPrimeDiscovery

      - name: Dry run procurement flow
        run: node dry_run_procurement.js
        working-directory: AgiPrimeDiscovery
